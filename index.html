<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hotel Brand Universe — STR Chain Scales 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --panel: #16161f;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --text-muted: #40404f;

    /* Chain scale colors - from luxury (gold) to economy (steel) */
    --luxury:     #f0c060;
    --upper-upscale: #e07d5a;
    --upscale:    #7ec8a0;
    --upper-mid:  #5aa8d8;
    --midscale:   #9080d8;
    --economy:    #6888a0;

    --node-r: 6px;
    --accent: #f0c060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    z-index: 50;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  #topbar h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--accent);
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  #search-wrap {
    flex: 1;
    min-width: 160px;
    max-width: 340px;
    position: relative;
  }
  #search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px 7px 32px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: rgba(240,192,96,0.4); }
  #search::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 13px; pointer-events: none;
  }

  /* ── SCALE LEGEND / FILTERS ── */
  #legend {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .scale-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    cursor: pointer;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
    opacity: 0.85;
    white-space: nowrap;
  }
  .scale-pill:hover { opacity: 1; transform: translateY(-1px); }
  .scale-pill.active { opacity: 1; }
  .scale-pill.inactive { opacity: 0.3; }
  .scale-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── VIEW TOGGLE ── */
  #view-toggle {
    display: flex;
    background: var(--bg3);
    border-radius: 8px;
    border: 1px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }
  .view-btn {
    padding: 6px 12px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    background: transparent;
    color: var(--text-dim);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-btn.active { background: rgba(240,192,96,0.15); color: var(--accent); }

  /* ── REGION FILTER ── */
  #region-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    outline: none;
    cursor: pointer;
  }

  /* ── MAIN CANVAS ── */
  #canvas {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #svg-container {
    width: 100%;
    height: 100%;
  }

  svg {
    width: 100%; height: 100%;
    cursor: grab;
  }
  svg.dragging { cursor: grabbing; }

  /* ── NODES ── */
  .operator-node circle {
    cursor: pointer;
    transition: r 0.2s;
  }
  .operator-node text {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    fill: var(--text);
    pointer-events: none;
    dominant-baseline: middle;
  }
  .brand-node circle {
    cursor: pointer;
  }
  .brand-node text {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    fill: rgba(232,232,240,0.75);
    pointer-events: none;
  }
  .link {
    fill: none;
    stroke-width: 1;
    opacity: 0.2;
  }
  .link.highlighted { opacity: 0.8; stroke-width: 1.5; }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    max-width: 280px;
    pointer-events: none;
    z-index: 200;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  #tooltip .tt-name {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--text);
    margin-bottom: 4px;
  }
  #tooltip .tt-parent {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  #tooltip .tt-scale {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    margin-bottom: 8px;
  }
  #tooltip .tt-regions {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    line-height: 1.6;
  }
  #tooltip .tt-count {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    margin-top: 6px;
  }

  /* ── SIDE PANEL ── */
  #side-panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 300px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #side-panel.open { transform: translateX(0); }

  #panel-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #panel-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 3px;
  }
  #panel-subtitle {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
  }
  #panel-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 14px;
  }
  #panel-close:hover { color: var(--text); }

  #panel-brands {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  #panel-brands::-webkit-scrollbar { width: 4px; }
  #panel-brands::-webkit-scrollbar-track { background: transparent; }
  #panel-brands::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .brand-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .brand-item:hover { background: var(--bg3); }
  .brand-item .bi-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .brand-item .bi-name {
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    flex: 1;
  }
  .brand-item .bi-scale {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
  }
  .brand-item .bi-regions {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
  }

  .scale-group-header {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 12px 10px 6px;
  }

  /* ── STATS BAR ── */
  #statsbar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 20px;
    display: flex;
    gap: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    pointer-events: none;
    z-index: 50;
  }
  #statsbar span { color: var(--text); }

  /* ── ZOOM CONTROLS ── */
  #zoom-controls {
    position: fixed;
    bottom: 70px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
  }
  .zoom-btn {
    width: 36px; height: 36px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .zoom-btn:hover { color: var(--text); background: var(--bg3); }

  /* ── LIST VIEW ── */
  #list-view {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  #list-view.active { display: block; }
  #svg-container.hidden { display: none; }

  .list-operator {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .list-op-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .list-op-header:hover { background: var(--bg3); }
  .list-op-name {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    color: var(--text);
  }
  .list-op-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .list-op-brands {
    display: none;
    padding: 0 16px 12px;
    border-top: 1px solid var(--border);
  }
  .list-op-brands.open { display: block; }
  .list-brand-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 12px;
  }
  .list-brand-row .lb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .list-brand-row .lb-name { flex: 1; color: var(--text); }
  .list-brand-row .lb-scale { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .list-brand-row .lb-regions { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); }

  /* Mobile adjustments */
  @media (max-width: 500px) {
    #topbar { padding: 8px 10px; gap: 8px; }
    #topbar h1 { font-size: 13px; }
    .scale-pill { font-size: 10px; padding: 3px 8px; }
    #side-panel { width: 100%; }
    #statsbar { font-size: 10px; gap: 14px; padding: 6px 14px; }
  }

  /* Loading */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    gap: 16px;
  }
  #loading h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--accent);
  }
  #loading p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>Hotel Brand Universe</h2>
  <p id="loading-msg">Loading 1,620 brands...</p>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <h1>🏨 Hotel Brand Universe</h1>

  <div id="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="search" type="text" placeholder="Search brand or operator..." autocomplete="off">
  </div>

  <div id="legend">
    <div class="scale-pill active" data-scale="Luxury Chain" style="border-color: var(--luxury); background: rgba(240,192,96,0.08)">
      <div class="scale-dot" style="background:var(--luxury)"></div>Luxury
    </div>
    <div class="scale-pill active" data-scale="Upper Upscale Chain" style="border-color: var(--upper-upscale); background: rgba(224,125,90,0.08)">
      <div class="scale-dot" style="background:var(--upper-upscale)"></div>Upper Upscale
    </div>
    <div class="scale-pill active" data-scale="Upscale Chain" style="border-color: var(--upscale); background: rgba(126,200,160,0.08)">
      <div class="scale-dot" style="background:var(--upscale)"></div>Upscale
    </div>
    <div class="scale-pill active" data-scale="Upper Midscale Chain" style="border-color: var(--upper-mid); background: rgba(90,168,216,0.08)">
      <div class="scale-dot" style="background:var(--upper-mid)"></div>Upper Midscale
    </div>
    <div class="scale-pill active" data-scale="Midscale Chain" style="border-color: var(--midscale); background: rgba(144,128,216,0.08)">
      <div class="scale-dot" style="background:var(--midscale)"></div>Midscale
    </div>
    <div class="scale-pill active" data-scale="Economy Chain" style="border-color: var(--economy); background: rgba(104,136,160,0.08)">
      <div class="scale-dot" style="background:var(--economy)"></div>Economy
    </div>
  </div>

  <select id="region-select">
    <option value="">All Regions</option>
    <option value="africa">Africa</option>
    <option value="apac">APAC</option>
    <option value="cs_america">C&S America</option>
    <option value="europe">Europe</option>
    <option value="middle_east">Middle East</option>
    <option value="n_america_excl_us">N America Excl US</option>
    <option value="united_states">United States</option>
  </select>

  <div id="view-toggle">
    <button class="view-btn active" data-view="graph">Graph</button>
    <button class="view-btn" data-view="list">List</button>
  </div>
</div>

<!-- CANVAS -->
<div id="canvas">
  <div id="svg-container">
    <svg id="main-svg"></svg>
  </div>
  <div id="list-view"></div>
</div>

<!-- TOOLTIP -->
<div id="tooltip"></div>

<!-- SIDE PANEL -->
<div id="side-panel">
  <div id="panel-header">
    <div id="panel-title"></div>
    <div id="panel-subtitle"></div>
    <div id="panel-close" onclick="closePanel()">✕</div>
  </div>
  <div id="panel-brands"></div>
</div>

<!-- STATS BAR -->
<div id="statsbar">
  <div>Brands: <span id="stat-brands">1,620</span></div>
  <div>Operators: <span id="stat-ops">903</span></div>
  <div>Showing: <span id="stat-showing">all</span></div>
</div>

<!-- ZOOM -->
<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-fit">⊡</button>
  <button class="zoom-btn" id="zoom-out">−</button>
</div>

<script>
// ── CONSTANTS ──
const SCALE_COLORS = {
  'Luxury Chain': '#f0c060',
  'Upper Upscale Chain': '#e07d5a',
  'Upscale Chain': '#7ec8a0',
  'Upper Midscale Chain': '#5aa8d8',
  'Midscale Chain': '#9080d8',
  'Economy Chain': '#6888a0'
};

const SCALE_ORDER = ['Luxury Chain','Upper Upscale Chain','Upscale Chain','Upper Midscale Chain','Midscale Chain','Economy Chain'];

// State
let allBrands = [];
let activeScales = new Set(Object.keys(SCALE_COLORS));
let activeRegion = '';
let searchTerm = '';
let selectedOperator = null;
let currentView = 'graph';

// D3 zoom
let svg, g, zoom, simulation;
let nodeMap = {};

// ── LOAD DATA ──
async function init() {
  document.getElementById('loading-msg').textContent = 'Loading brand data...';
  const resp = await fetch('brands_data.json');
  allBrands = await resp.json();
  document.getElementById('loading-msg').textContent = 'Building graph...';
  
  // Short delay so message shows
  setTimeout(() => {
    buildGraph();
    buildListView();
    document.getElementById('loading').style.display = 'none';
  }, 100);
}

// ── FILTER BRANDS ──
function getFiltered() {
  return allBrands.filter(b => {
    if (!activeScales.has(b.chain_scale)) return false;
    if (activeRegion && !b.regions.includes(regionLabel(activeRegion))) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      return b.brand.toLowerCase().includes(q) || b.parent.toLowerCase().includes(q);
    }
    return true;
  });
}

function regionLabel(key) {
  const m = {
    'africa': 'Africa', 'apac': 'APAC', 'cs_america': 'C&S America',
    'europe': 'Europe', 'middle_east': 'Middle East',
    'n_america_excl_us': 'N America Excl US', 'united_states': 'United States'
  };
  return m[key] || key;
}

// ── BUILD GRAPH ──
function buildGraph() {
  const filtered = getFiltered();

  // Group by parent, only include parents with at least 1 brand
  const byParent = d3.group(filtered, d => d.parent);

  // Build nodes & links
  const nodes = [];
  const links = [];
  nodeMap = {};

  // Operator nodes
  byParent.forEach((brands, parent) => {
    const opNode = {
      id: 'op_' + parent,
      type: 'operator',
      name: parent,
      brandCount: brands.length,
      brands: brands
    };
    nodes.push(opNode);
    nodeMap[opNode.id] = opNode;

    brands.forEach(b => {
      const bNode = {
        id: 'br_' + b.brand + '_' + parent,
        type: 'brand',
        name: b.brand,
        parent: parent,
        chain_scale: b.chain_scale,
        scale_id: b.scale_id,
        regions: b.regions
      };
      nodes.push(bNode);
      nodeMap[bNode.id] = bNode;
      links.push({ source: opNode.id, target: bNode.id, scale: b.chain_scale });
    });
  });

  updateStats(filtered.length, byParent.size);

  // Build SVG
  const container = document.getElementById('svg-container');
  const W = container.clientWidth;
  const H = container.clientHeight;

  d3.select('#main-svg').selectAll('*').remove();

  svg = d3.select('#main-svg');
  zoom = d3.zoom()
    .scaleExtent([0.05, 4])
    .on('zoom', (event) => { g.attr('transform', event.transform); });

  svg.call(zoom);
  svg.on('mousedown', () => svg.classed('dragging', true));
  svg.on('mouseup mouseleave', () => svg.classed('dragging', false));

  g = svg.append('g');

  // Defs: glow filter
  const defs = svg.append('defs');
  Object.entries(SCALE_COLORS).forEach(([scale, color]) => {
    const fid = 'glow-' + scale.replace(/ /g,'_');
    const filter = defs.append('filter').attr('id', fid);
    filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
    const merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'blur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');
  });

  // Simulation
  // Operator radius based on brand count
  const opRadiusScale = d3.scaleSqrt().domain([1, 43]).range([10, 40]);

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id)
      .distance(d => {
        const opNode = nodeMap[typeof d.source === 'object' ? d.source.id : d.source];
        return opNode ? opRadiusScale(opNode.brandCount) + 30 : 60;
      })
      .strength(0.8))
    .force('charge', d3.forceManyBody()
      .strength(d => d.type === 'operator' ? -300 : -20))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide()
      .radius(d => d.type === 'operator' ? opRadiusScale(d.brandCount) + 5 : 8))
    .alphaDecay(0.02);

  // Draw links
  const link = g.append('g').attr('class', 'links')
    .selectAll('.link')
    .data(links)
    .enter().append('line')
    .attr('class', 'link')
    .style('stroke', d => SCALE_COLORS[d.scale] || '#aaa');

  // Draw operator nodes
  const opNode = g.append('g').attr('class', 'op-nodes')
    .selectAll('.operator-node')
    .data(nodes.filter(d => d.type === 'operator'))
    .enter().append('g')
    .attr('class', 'operator-node')
    .call(d3.drag()
      .on('start', dragstart)
      .on('drag', dragged)
      .on('end', dragend))
    .on('click', (event, d) => { event.stopPropagation(); openPanel(d); })
    .on('mouseover', (event, d) => showTooltip(event, d))
    .on('mousemove', (event, d) => moveTooltip(event))
    .on('mouseout', hideTooltip);

  opNode.append('circle')
    .attr('r', d => opRadiusScale(d.brandCount))
    .style('fill', d => {
      // Color by dominant scale in this operator
      const scaleCounts = d3.rollup(d.brands, v => v.length, b => b.chain_scale);
      const dominant = [...scaleCounts.entries()].sort((a,b) => b[1]-a[1])[0][0];
      return SCALE_COLORS[dominant] || '#aaa';
    })
    .style('fill-opacity', 0.15)
    .style('stroke', d => {
      const scaleCounts = d3.rollup(d.brands, v => v.length, b => b.chain_scale);
      const dominant = [...scaleCounts.entries()].sort((a,b) => b[1]-a[1])[0][0];
      return SCALE_COLORS[dominant] || '#aaa';
    })
    .style('stroke-width', 1.5)
    .style('stroke-opacity', 0.7);

  opNode.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .style('font-size', d => Math.min(11, opRadiusScale(d.brandCount) * 0.55) + 'px')
    .style('font-weight', '500')
    .text(d => {
      const maxLen = Math.floor(opRadiusScale(d.brandCount) * 2.5);
      return d.name.length > maxLen ? d.name.slice(0, maxLen - 1) + '…' : d.name;
    });

  // Draw brand nodes
  const brNode = g.append('g').attr('class', 'brand-nodes')
    .selectAll('.brand-node')
    .data(nodes.filter(d => d.type === 'brand'))
    .enter().append('g')
    .attr('class', 'brand-node')
    .on('mouseover', (event, d) => showTooltip(event, d))
    .on('mousemove', (event, d) => moveTooltip(event))
    .on('mouseout', hideTooltip);

  brNode.append('circle')
    .attr('r', 5)
    .style('fill', d => SCALE_COLORS[d.chain_scale] || '#aaa')
    .style('fill-opacity', 0.6)
    .style('stroke', d => SCALE_COLORS[d.chain_scale] || '#aaa')
    .style('stroke-width', 0.5)
    .style('stroke-opacity', 0.8);

  // Labels only shown at zoom >= 1.5 (via CSS opacity trick using zoom level)
  brNode.append('text')
    .attr('dy', '-8px')
    .attr('text-anchor', 'middle')
    .style('opacity', 0)
    .attr('class', 'brand-label')
    .text(d => d.name);

  // Track zoom for brand label visibility
  zoom.on('zoom.labels', (event) => {
    const k = event.transform.k;
    g.selectAll('.brand-label').style('opacity', k > 1.8 ? Math.min(1, (k - 1.8) * 2) : 0);
  });

  // Tick
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    opNode.attr('transform', d => `translate(${d.x},${d.y})`);
    brNode.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Click background to close panel
  svg.on('click.bg', () => closePanel());

  // Handle search highlight
  applySearch();
}

function dragstart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragend(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ── TOOLTIP ──
function showTooltip(event, d) {
  const tt = document.getElementById('tooltip');
  if (d.type === 'operator') {
    const scaleBreakdown = d3.rollup(d.brands, v => v.length, b => b.chain_scale);
    const scaleLines = SCALE_ORDER
      .filter(s => scaleBreakdown.has(s))
      .map(s => `<span style="color:${SCALE_COLORS[s]}">${s.replace(' Chain','')}: ${scaleBreakdown.get(s)}</span>`)
      .join(' · ');
    tt.innerHTML = `
      <div class="tt-name">${d.name}</div>
      <div class="tt-count">${d.brandCount} brand${d.brandCount > 1 ? 's' : ''}</div>
      <div class="tt-regions" style="margin-top:8px">${scaleLines}</div>
    `;
  } else {
    const color = SCALE_COLORS[d.chain_scale] || '#aaa';
    tt.innerHTML = `
      <div class="tt-name">${d.name}</div>
      <div class="tt-parent">by ${d.parent}</div>
      <div class="tt-scale" style="background:${color}22; color:${color}; border: 1px solid ${color}44">
        <div style="width:6px;height:6px;border-radius:50%;background:${color}"></div>
        ${d.chain_scale}
      </div>
      <div class="tt-regions">${d.regions.join(' · ') || 'No region data'}</div>
    `;
  }
  tt.style.display = 'block';
  moveTooltip(event);
}

function moveTooltip(event) {
  const tt = document.getElementById('tooltip');
  const x = event.clientX, y = event.clientY;
  const w = tt.offsetWidth, h = tt.offsetHeight;
  const vw = window.innerWidth, vh = window.innerHeight;
  tt.style.left = Math.min(x + 12, vw - w - 8) + 'px';
  tt.style.top = Math.min(y + 12, vh - h - 8) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ── SIDE PANEL ──
function openPanel(opData) {
  const panel = document.getElementById('side-panel');
  document.getElementById('panel-title').textContent = opData.name;
  document.getElementById('panel-subtitle').textContent = `${opData.brandCount} brand${opData.brandCount > 1 ? 's' : ''}`;

  const container = document.getElementById('panel-brands');
  container.innerHTML = '';

  // Group brands by scale
  const grouped = d3.group(opData.brands, b => b.chain_scale);
  SCALE_ORDER.forEach(scale => {
    if (!grouped.has(scale)) return;
    const brands = grouped.get(scale);
    const color = SCALE_COLORS[scale];
    const header = document.createElement('div');
    header.className = 'scale-group-header';
    header.style.color = color;
    header.textContent = scale.replace(' Chain', '');
    container.appendChild(header);

    brands.sort((a,b) => a.brand.localeCompare(b.brand)).forEach(brand => {
      const item = document.createElement('div');
      item.className = 'brand-item';
      item.innerHTML = `
        <div class="bi-dot" style="background:${color}"></div>
        <div class="bi-name">${brand.brand}</div>
        <div class="bi-regions">${brand.regions.slice(0,3).join(', ')}</div>
      `;
      container.appendChild(item);
    });
  });

  panel.classList.add('open');
  selectedOperator = opData.name;

  // Highlight in graph
  highlightOperator(opData.name);
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
  selectedOperator = null;
  clearHighlight();
}

function highlightOperator(opName) {
  if (!g) return;
  g.selectAll('.operator-node circle')
    .style('fill-opacity', d => d.name === opName ? 0.4 : 0.1)
    .style('stroke-opacity', d => d.name === opName ? 1 : 0.3);

  g.selectAll('.brand-node circle')
    .style('fill-opacity', d => d.parent === opName ? 0.9 : 0.15)
    .style('stroke-opacity', d => d.parent === opName ? 1 : 0.2);

  g.selectAll('.link')
    .classed('highlighted', d => {
      const src = typeof d.source === 'object' ? d.source : nodeMap[d.source];
      return src && src.name === opName;
    });
}

function clearHighlight() {
  if (!g) return;
  g.selectAll('.operator-node circle')
    .style('fill-opacity', 0.15)
    .style('stroke-opacity', 0.7);
  g.selectAll('.brand-node circle')
    .style('fill-opacity', 0.6)
    .style('stroke-opacity', 0.8);
  g.selectAll('.link').classed('highlighted', false);
}

// ── SEARCH HIGHLIGHT ──
function applySearch() {
  if (!g) return;
  if (!searchTerm) { clearHighlight(); return; }
  const q = searchTerm.toLowerCase();

  g.selectAll('.operator-node circle')
    .style('fill-opacity', d => d.name.toLowerCase().includes(q) ? 0.4 : 0.05)
    .style('stroke-opacity', d => d.name.toLowerCase().includes(q) ? 1 : 0.15);

  g.selectAll('.brand-node circle')
    .style('fill-opacity', d =>
      d.name.toLowerCase().includes(q) || d.parent.toLowerCase().includes(q) ? 0.9 : 0.1)
    .style('stroke-opacity', d =>
      d.name.toLowerCase().includes(q) || d.parent.toLowerCase().includes(q) ? 1 : 0.1);
}

// ── LIST VIEW ──
function buildListView() {
  const filtered = getFiltered();
  const byParent = d3.group(filtered, d => d.parent);
  const listEl = document.getElementById('list-view');
  listEl.innerHTML = '';

  // Sort by brand count desc
  const sorted = [...byParent.entries()].sort((a,b) => b[1].length - a[1].length);

  sorted.forEach(([parent, brands]) => {
    const div = document.createElement('div');
    div.className = 'list-operator';

    const header = document.createElement('div');
    header.className = 'list-op-header';
    header.innerHTML = `
      <div class="list-op-name">${parent}</div>
      <div class="list-op-count">${brands.length} brand${brands.length > 1 ? 's' : ''} ▾</div>
    `;

    const brandsDiv = document.createElement('div');
    brandsDiv.className = 'list-op-brands';

    const grouped = d3.group(brands, b => b.chain_scale);
    SCALE_ORDER.forEach(scale => {
      if (!grouped.has(scale)) return;
      const color = SCALE_COLORS[scale];
      const gh = document.createElement('div');
      gh.style.cssText = `font-family:'DM Mono',monospace;font-size:10px;color:${color};padding:8px 0 4px;text-transform:uppercase;letter-spacing:0.1em`;
      gh.textContent = scale.replace(' Chain', '');
      brandsDiv.appendChild(gh);

      grouped.get(scale).sort((a,b) => a.brand.localeCompare(b.brand)).forEach(b => {
        const row = document.createElement('div');
        row.className = 'list-brand-row';
        row.innerHTML = `
          <div class="lb-dot" style="background:${color}"></div>
          <div class="lb-name">${b.brand}</div>
          <div class="lb-regions">${b.regions.join(', ') || '—'}</div>
        `;
        brandsDiv.appendChild(row);
      });
    });

    header.addEventListener('click', () => brandsDiv.classList.toggle('open'));
    div.appendChild(header);
    div.appendChild(brandsDiv);
    listEl.appendChild(div);
  });
}

// ── STATS ──
function updateStats(brandCount, opCount) {
  document.getElementById('stat-brands').textContent = brandCount.toLocaleString();
  document.getElementById('stat-ops').textContent = opCount.toLocaleString();
  const parts = [];
  if (searchTerm) parts.push(`"${searchTerm}"`);
  if (activeRegion) parts.push(regionLabel(activeRegion));
  if (activeScales.size < 6) parts.push(activeScales.size + ' scales');
  document.getElementById('stat-showing').textContent = parts.length ? parts.join(', ') : 'all';
}

// ── EVENTS ──

// Scale filter pills
document.querySelectorAll('.scale-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const scale = pill.dataset.scale;
    if (activeScales.has(scale)) {
      if (activeScales.size > 1) {
        activeScales.delete(scale);
        pill.classList.remove('active');
        pill.classList.add('inactive');
      }
    } else {
      activeScales.add(scale);
      pill.classList.add('active');
      pill.classList.remove('inactive');
    }
    refresh();
  });
});

// Search
let searchDebounce;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchDebounce);
  searchTerm = e.target.value.trim();
  searchDebounce = setTimeout(() => {
    if (currentView === 'graph') {
      applySearch();
      updateStats(getFiltered().length, new Set(getFiltered().map(b => b.parent)).size);
    } else {
      buildListView();
    }
  }, 200);
});

// Region
document.getElementById('region-select').addEventListener('change', e => {
  activeRegion = e.target.value;
  refresh();
});

// View toggle
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;

    const svg = document.getElementById('svg-container');
    const list = document.getElementById('list-view');

    if (currentView === 'graph') {
      svg.classList.remove('hidden');
      list.classList.remove('active');
    } else {
      svg.classList.add('hidden');
      list.classList.add('active');
      buildListView();
    }
  });
});

// Zoom buttons
document.getElementById('zoom-in').addEventListener('click', () => {
  svg.transition().duration(300).call(zoom.scaleBy, 1.5);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  svg.transition().duration(300).call(zoom.scaleBy, 0.67);
});
document.getElementById('zoom-fit').addEventListener('click', fitView);

function fitView() {
  if (!svg || !g) return;
  const container = document.getElementById('svg-container');
  const W = container.clientWidth, H = container.clientHeight;
  const bounds = g.node().getBBox();
  if (!bounds.width || !bounds.height) return;
  const scale = Math.min(0.9 * W / bounds.width, 0.9 * H / bounds.height, 2);
  const tx = W/2 - scale*(bounds.x + bounds.width/2);
  const ty = H/2 - scale*(bounds.y + bounds.height/2);
  svg.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function refresh() {
  if (currentView === 'graph') {
    if (simulation) simulation.stop();
    buildGraph();
  } else {
    buildListView();
  }
}

// ── START ──
init();
</script>
</body>
</html>
